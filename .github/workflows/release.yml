name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

          $shouldRelease = $true

          $prevJson = git show HEAD~1:package.json 2>$null
          if ($LASTEXITCODE -eq 0 -and $prevJson) {
            $prevVersion = ($prevJson | ConvertFrom-Json).version
            if ($version -eq $prevVersion) {
              Write-Host "Version unchanged ($version), skipping release."
              $shouldRelease = $false
            }
          }

          if ($shouldRelease) {
            git fetch --tags 2>$null
            git rev-parse "refs/tags/v$version" 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Tag v$version already exists, skipping release."
              $shouldRelease = $false
            }
          }

          "changed=$shouldRelease" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        if: steps.version.outputs.changed == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: yarn install --immutable

      - name: Sync workspace versions
        if: steps.version.outputs.changed == 'true'
        run: node scripts/sync-version.js

      - name: Build Electron app
        if: steps.version.outputs.changed == 'true'
        run: yarn dist

      - name: Publish GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Tesla Manager v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
